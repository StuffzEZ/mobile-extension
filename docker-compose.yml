version: '3.8'

services:
  mobile-extension-proxy:
    build: .
    image: ghcr.io/leakhw/mobile:latest
    container_name: leakhw-mobile-extension-proxy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      # Optional: persist cache between restarts
      - extension-cache:/app/extension_cache
    networks:
      - proxy-network

volumes:
  extension-cache:
    driver: local

networks:
  proxy-network:
    driver: bridge
